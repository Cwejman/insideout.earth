<!doctype html>
<html lang="sv">
<head>
    <meta charset="utf-8">
    <title>InsideOut — Årsredovisning 2025</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../annual/style.css?v=2">
    <style>
        .documents {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin: 2.5rem 0 3rem;
        }

        main {
            max-width: 680px;
        }

        a.doc-card,
        a.doc-card:link,
        a.doc-card:visited {
            display: block;
            text-decoration: none;
            color: hsl(0, 0%, 15%);
            border: 1px solid hsl(0, 0%, 85%);
            border-radius: 8px;
            overflow: hidden;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        a.doc-card:hover {
            border-color: hsl(0, 0%, 65%);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            text-decoration: none;
            color: hsl(0, 0%, 15%);
        }

        .doc-thumb {
            width: 100%;
            display: block;
            border-bottom: 1px solid hsl(0, 0%, 90%);
        }

        .doc-info {
            padding: 0.75rem 0.85rem;
        }

        .doc-title {
            font-weight: 500;
            font-size: 0.9rem;
            line-height: 1.3;
            margin-bottom: 0.2rem;
        }

        .doc-meta {
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: hsl(0, 0%, 50%);
        }

        .intro {
            color: hsl(0, 0%, 35%);
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
<main>

<h1>Årsredovisning 2025</h1>
<p class="subtitle">Inside Out &middot; 802552-5414</p>

<hr>

<div class="documents">
    <a class="doc-card" href="verksamhetsberattelse-2025.pdf" download>
        <img class="doc-thumb" src="thumb-verksamhet.jpg" alt="Verksamhetsberättelse 2025" loading="lazy">
        <div class="doc-info">
            <div class="doc-title">Verksamhetsberättelse</div>
            <span class="doc-meta">PDF</span>
        </div>
    </a>
    <a class="doc-card" href="ekonomisk-berattelse-2025.pdf" download>
        <img class="doc-thumb" src="thumb-ekonomisk.jpg" alt="Ekonomisk berättelse 2025" loading="lazy">
        <div class="doc-info">
            <div class="doc-title">Ekonomisk berättelse</div>
            <span class="doc-meta">PDF</span>
        </div>
    </a>
    <a class="doc-card" href="revisionsberattelse-2025.pdf" download>
        <img class="doc-thumb" src="thumb-revision.jpg" alt="Revisionsberättelse 2025" loading="lazy">
        <div class="doc-info">
            <div class="doc-title">Revisionsberättelse</div>
            <span class="doc-meta">PDF</span>
        </div>
    </a>
</div>

</main>
</body>
</html>
